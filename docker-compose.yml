services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sondabase
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    depends_on:
      - mysql
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      FRONTEND_URL: http://localhost:5173
      DATABASE_URL: mysql://root:root@mysql:3306/sondabase
      JWT_SECRET: change-me-access-secret
      REFRESH_TOKEN_SECRET: change-me-refresh-secret
      UPLOAD_DIR: /app/uploads
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/app/uploads

volumes:
  mysql-data:
  uploads-data:
